<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Victor Morais | Redirecionando...</title>
    <meta http-equiv="refresh"
        content="3;url=https://young-calf-c5c.notion.site/Product-Designer-d708949859a34846a1f44bd1450505dd?pvs=73">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --accent-color: #6366f1;
            --text-color: #ffffff;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.1rem;
            margin: 0;
            opacity: 0.8;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.5;
            margin-top: 10px;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0% {
                content: '';
            }

            33% {
                content: '.';
            }

            66% {
                content: '..';
            }

            100% {
                content: '...';
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <span class="loader"></span>
        <h1>Redirecionando para o Portfólio<span class="dots"></span></h1>
        <p>Você será levado ao Notion em instantes.</p>
    </div>

    <script>
        // Redirect after a short delay to show the nice loading screen
        setTimeout(() => {
            window.location.replace("https://young-calf-c5c.notion.site/Product-Designer-d708949859a34846a1f44bd1450505dd?pvs=73");
        }, 2000);
    </script>
</body>

</html>
